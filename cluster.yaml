apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: college-portal-cluster
  region: ap-south-1
  

nodeGroups:
  - name: worker-nodes
    instanceType: t3.small
    desiredCapacity: 2
    minSize: 1
    maxSize: 4
    volumeSize: 20
    iam:
      withAddonPolicies:
        autoScaler: true
        albIngress: true